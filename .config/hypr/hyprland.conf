################
### MONITORS ###
################
monitor=DP-1, 2560x1440@144, 0x0, 1 # bottom right
monitor=DP-2, 3840x2160@60, -2560x0, 1.5 # bottom left
monitor=HDMI-A-1, 2560x1440@60, 0x-1440, 1 #top right
monitor=DP-3, 3840x2160@60, -2560x-1440, 1.5 #top left

# env = HYPRCURSOR_THEME,theme
# env = HYPRCURSOR_SIZE,24

# setup workspaces to be id-ed by letters instead of numbers, probably never going to use this many workspaces
$wsa = 1
$wsb = 2
$wsc = 3
$wsd = 4
$wse = 5
$wsf = 6
$wsg = 7
$wsh = 8
$wsi = 9
$wsj = 10
$wsk = 11
$wsl = 12
$wsm = 13
$wsn = 14
$wso = 15
$wsp = 16
$wsq = 17
$wsr = 18
$wss = 19
$wst = 20
$wsu = 21
$wsv = 22
$wsw = 23
$wsx = 24
$wsy = 25
$wsz = 26

workspace = $wsa, defaultName:a
workspace = $wsb, defaultName:b
workspace = $wsc, defaultName:c
workspace = $wsd, defaultName:d
workspace = $wse, defaultName:e
workspace = $wsf, defaultName:f
workspace = $wsg, defaultName:g, monitor:HDMI-A-1
workspace = $wsh, defaultName:h
workspace = $wsi, defaultName:i
workspace = $wsj, defaultName:j
workspace = $wsk, defaultName:k
workspace = $wsl, defaultName:l
workspace = $wsm, defaultName:m, monitor:HDMI-A-1
workspace = $wsn, defaultName:n
workspace = $wso, defaultName:o
workspace = $wsp, defaultName:p
workspace = $wsq, defaultName:q
workspace = $wsr, defaultName:r
workspace = $wss, defaultName:s
workspace = $wst, defaultName:t
workspace = $wsu, defaultName:u
workspace = $wsv, defaultName:v
workspace = $wsw, defaultName:w
workspace = $wsx, defaultName:x
workspace = $wsy, defaultName:y
workspace = $wsz, defaultName:z

#################
### AUTOSTART ###
#################

# background services
exec-once = waybar
exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprpaper
exec-once = /home/eric/.config/hypr/scripts/rotate-wallpapers.sh
exec-once = insync start
exec-once = hyprsunset
exec-once = swaync

# Auto start some applications, and put them in their default location
windowrule = match:class discord, workspace $wsg
windowrule = match:class .*steam.*, workspace $wsg
windowrule = match:class .*signal.*, workspace $wsg

windowrule = match:class .*Evolution.*, workspace $wsm

exec-once = evolution
exec-once = steam
exec-once = signal-desktop
exec-once = discord

